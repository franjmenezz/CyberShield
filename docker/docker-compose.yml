#
# SERVICES:
#   - ODOO 18 with CyberShield module
#   - PostgreSQL 15 (ODOO database)
#   - Wazuh Manager (SIEM backend)
#   - Wazuh Indexer (OpenSearch)
#   - Wazuh Dashboard
#   - nginx (reverse proxy with SSL)
#
# USAGE:
#   1. Copy .env.example to .env and fill in your values
#   2. Run: docker compose up -d
#   3. Access ODOO at https://your-domain.com
#   4. Access Wazuh at https://your-domain.com:5601
#
# ==============================================================================

services:

  # ── NGINX REVERSE PROXY (SSL termination) ─────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: cybershield_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - odoo
    networks:
      - cybershield_net
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── POSTGRESQL (ODOO database) ─────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: cybershield_db
    restart: always
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: ${ODOO_DB_USER:-odoo}
      POSTGRES_PASSWORD: ${ODOO_DB_PASSWORD:?ODOO_DB_PASSWORD required}
    volumes:
      - odoo_db_data:/var/lib/postgresql/data
    networks:
      - cybershield_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ODOO_DB_USER:-odoo}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Security: not exposed to host
    expose:
      - "5432"

  # ── ODOO 18 with CyberShield ───────────────────────────────────────────────
  odoo:
    image: odoo:18.0
    container_name: cybershield_odoo
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      HOST: db
      USER: ${ODOO_DB_USER:-odoo}
      PASSWORD: ${ODOO_DB_PASSWORD:?required}
    volumes:
      - ./odoo/config:/etc/odoo:ro
      - ./cyber_shield:/mnt/extra-addons/cyber_shield:ro
      - odoo_data:/var/lib/odoo
    networks:
      - cybershield_net
    expose:
      - "8069"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8069/web/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── WAZUH MANAGER ──────────────────────────────────────────────────────────
  wazuh-manager:
    image: wazuh/wazuh-manager:4.7.3
    container_name: cybershield_wazuh_manager
    restart: always
    hostname: wazuh-manager
    environment:
      INDEXER_URL: https://wazuh-indexer:9200
      INDEXER_USERNAME: ${WAZUH_INDEXER_USER:-admin}
      INDEXER_PASSWORD: ${WAZUH_INDEXER_PASSWORD:?required}
      FILEBEAT_SSL_VERIFICATION_MODE: full
      SSL_CERTIFICATE_AUTHORITIES: /etc/ssl/root-ca.pem
      SSL_CERTIFICATE: /etc/ssl/filebeat.pem
      SSL_KEY: /etc/ssl/filebeat-key.pem
    volumes:
      - wazuh_api_configuration:/var/ossec/api/configuration
      - wazuh_etc:/var/ossec/etc
      - wazuh_logs:/var/ossec/logs
      - wazuh_queue:/var/ossec/queue
      - wazuh_var_multigroups:/var/ossec/var/multigroups
      - wazuh_integrations:/var/ossec/integrations
      - wazuh_active_response:/var/ossec/active-response/bin
      - wazuh_agentless:/var/ossec/agentless
      - wazuh_wodles:/var/ossec/wodles
      - filebeat_etc:/etc/filebeat
      - filebeat_var:/var/lib/filebeat
      - ./wazuh/config/wazuh_indexer_ssl_certs/root-ca-manager.pem:/etc/ssl/root-ca.pem:ro
      - ./wazuh/config/wazuh_indexer_ssl_certs/wazuh-manager.pem:/etc/ssl/filebeat.pem:ro
      - ./wazuh/config/wazuh_indexer_ssl_certs/wazuh-manager-key.pem:/etc/ssl/filebeat-key.pem:ro
      - ./wazuh/config/wazuh_cluster/wazuh_manager.conf:/wazuh-config-mount/etc/ossec.conf:ro
    ports:
      - "1514:1514/udp"   # Agent communication
      - "1515:1515"       # Agent enrollment
      - "55000:55000"     # Wazuh API
    networks:
      - cybershield_net

  # ── WAZUH INDEXER (OpenSearch) ─────────────────────────────────────────────
  wazuh-indexer:
    image: wazuh/wazuh-indexer:4.7.3
    container_name: cybershield_wazuh_indexer
    restart: always
    hostname: wazuh-indexer
    environment:
      OPENSEARCH_JAVA_OPTS: "-Xms1g -Xmx1g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - wazuh_indexer_data:/var/lib/wazuh-indexer
      - ./wazuh/config/wazuh_indexer_ssl_certs/root-ca.pem:/usr/share/wazuh-indexer/certs/root-ca.pem:ro
      - ./wazuh/config/wazuh_indexer_ssl_certs/wazuh-indexer-key.pem:/usr/share/wazuh-indexer/certs/wazuh-indexer.key:ro
      - ./wazuh/config/wazuh_indexer_ssl_certs/wazuh-indexer.pem:/usr/share/wazuh-indexer/certs/wazuh-indexer.pem:ro
      - ./wazuh/config/wazuh_indexer_ssl_certs/admin.pem:/usr/share/wazuh-indexer/certs/admin.pem:ro
      - ./wazuh/config/wazuh_indexer_ssl_certs/admin-key.pem:/usr/share/wazuh-indexer/certs/admin-key.pem:ro
      - ./wazuh/config/wazuh_indexer/wazuh.indexer.yml:/usr/share/wazuh-indexer/opensearch.yml:ro
      - ./wazuh/config/wazuh_indexer/internal_users.yml:/usr/share/wazuh-indexer/opensearch-security/internal_users.yml:ro
    networks:
      - cybershield_net
    expose:
      - "9200"

  # ── WAZUH DASHBOARD ────────────────────────────────────────────────────────
  wazuh-dashboard:
    image: wazuh/wazuh-dashboard:4.7.3
    container_name: cybershield_wazuh_dashboard
    restart: always
    hostname: wazuh-dashboard
    environment:
      INDEXER_USERNAME: ${WAZUH_INDEXER_USER:-admin}
      INDEXER_PASSWORD: ${WAZUH_INDEXER_PASSWORD:?required}
      WAZUH_API_URL: https://wazuh-manager
      DASHBOARD_USERNAME: ${WAZUH_DASHBOARD_USER:-kibanaserver}
      DASHBOARD_PASSWORD: ${WAZUH_DASHBOARD_PASSWORD:?required}
      API_USERNAME: ${WAZUH_API_USER:-wazuh-wui}
      API_PASSWORD: ${WAZUH_API_PASSWORD:?required}
    volumes:
      - ./wazuh/config/wazuh_indexer_ssl_certs/wazuh-dashboard.pem:/usr/share/wazuh-dashboard/certs/wazuh-dashboard.pem:ro
      - ./wazuh/config/wazuh_indexer_ssl_certs/wazuh-dashboard-key.pem:/usr/share/wazuh-dashboard/certs/wazuh-dashboard-key.pem:ro
      - ./wazuh/config/wazuh_indexer_ssl_certs/root-ca.pem:/usr/share/wazuh-dashboard/certs/root-ca.pem:ro
      - ./wazuh/config/wazuh_dashboard/wazuh.yml:/wazuh-config-mount/data/wazuh/config/wazuh.yml:ro
      - ./wazuh/config/wazuh_dashboard/opensearch_dashboards.yml:/usr/share/wazuh-dashboard/config/opensearch_dashboards.yml:ro
    depends_on:
      - wazuh-indexer
      - wazuh-manager
    networks:
      - cybershield_net
    expose:
      - "443"

# ── NETWORKS ───────────────────────────────────────────────────────────────────
networks:
  cybershield_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ── VOLUMES ────────────────────────────────────────────────────────────────────
volumes:
  odoo_db_data:
  odoo_data:
  nginx_logs:
  wazuh_api_configuration:
  wazuh_etc:
  wazuh_logs:
  wazuh_queue:
  wazuh_var_multigroups:
  wazuh_integrations:
  wazuh_active_response:
  wazuh_agentless:
  wazuh_wodles:
  filebeat_etc:
  filebeat_var:
  wazuh_indexer_data:
