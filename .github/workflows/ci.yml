name: CyberShield CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  security-lint:
    name: Security & Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install flake8 bandit safety
      - name: Lint with flake8
        run: flake8 cyber_shield/ --max-line-length=120 --exclude=__pycache__
      - name: SAST with Bandit
        run: bandit -r cyber_shield/ -ll -x cyber_shield/tests/
      - name: Dependency vulnerability check
        run: safety check

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: security-lint
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build release package
        run: zip -r cyber_shield_release.zip cyber_shield/ --exclude "*.pyc" --exclude "__pycache__/*"
